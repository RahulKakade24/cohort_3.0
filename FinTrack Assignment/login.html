<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>FinTrack Pro | Login</title>

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body class="auth-body">

    <div class="auth-container">

        <div class="auth-left">

            <div class="logo">

                <i class="fa-solid fa-wallet"></i>

                <span>FinTrack Pro</span>

            </div>

            <h1>

                Welcome Back 👋

            </h1>

            <p>

                Login to continue managing your
                personal finances.

            </p>

            <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=800"
                alt="Finance">

        </div>

        <div class="auth-right">

            <div class="auth-card">

                <h2>

                    Login

                </h2>

                <p>

                    Enter your account details.

                </p>

                <form id="loginForm">

                    <div class="form-group">

                        <label>

                            Email

                        </label>

                        <input
                            type="email"
                            id="loginEmail"
                            placeholder="Enter email"
                            required>

                    </div>

                    <div class="form-group">

                        <label>

                            Password

                        </label>

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter password"
                            required>

                    </div>

                    <div class="remember">

                        <label>

                            <input
                                type="checkbox"
                                id="rememberMe">

                            Remember Me

                        </label>

                    </div>

                    <button
                        type="submit"
                        class="primary-btn auth-btn">

                        <i class="fa-solid fa-right-to-bracket"></i>

                        Login

                    </button>

                </form>

                <div class="divider">

                    <span>

                        OR

                    </span>

                </div>

                <p class="register-text">

                    Don't have an account?

                    <a href="register.html">

                        Register Here

                    </a>

                </p>

            </div>

        </div>

    </div>

    <!-- Toast -->

    <div
        id="toast"
        class="toast">

    </div>

    <script src="auth.js"></script>

</body>

</html>
