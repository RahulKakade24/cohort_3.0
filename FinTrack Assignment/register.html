<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>FinTrack Pro | Register</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Main CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body class="auth-body">

    <div class="auth-container">

        <!-- Left Side -->

        <div class="auth-left">

            <div class="logo">

                <i class="fa-solid fa-wallet"></i>

                <span>FinTrack Pro</span>

            </div>

            <h1>

                Create Your Account 🚀

            </h1>

            <p>

                Register to start tracking your
                income, expenses and financial goals.

            </p>

            <img
                src="https://images.unsplash.com/photo-1554224155-d18cb2f99c07?w=900"
                alt="Register">

        </div>

        <!-- Right Side -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>

                    Register

                </h2>

                <p>

                    Create your FinTrack Pro account.

                </p>

                <form id="registerForm">

                    <!-- Full Name -->

                    <div class="form-group">

                        <label for="registerName">

                            Full Name

                        </label>

                        <input
                            type="text"
                            id="registerName"
                            placeholder="Enter your full name"
                            required>

                    </div>

                    <!-- Email -->

                    <div class="form-group">

                        <label for="registerEmail">

                            Email Address

                        </label>

                        <input
                            type="email"
                            id="registerEmail"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <!-- Password -->

                    <div class="form-group">

                        <label for="registerPassword">

                            Password

                        </label>

                        <input
                            type="password"
                            id="registerPassword"
                            placeholder="Create password"
                            minlength="6"
                            required>

                    </div>

                    <!-- Confirm Password -->

                    <div class="form-group">

                        <label for="confirmPassword">

                            Confirm Password

                        </label>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm password"
                            minlength="6"
                            required>

                    </div>

                    <!-- Terms -->

                    <div class="remember">

                        <label>

                            <input
                                type="checkbox"
                                id="terms"
                                required>

                            I agree to the Terms &
                            Privacy Policy

                        </label>

                    </div>

                    <!-- Register Button -->

                    <button
                        type="submit"
                        class="primary-btn auth-btn">

                        <i class="fa-solid fa-user-plus"></i>

                        Create Account

                    </button>

                </form>

                <div class="divider">

                    <span>

                        OR

                    </span>

                </div>

                <p class="register-text">

                    Already have an account?

                    <a href="login.html">

                        Login Here

                    </a>

                </p>

            </div>

        </div>

    </div>

    <!-- Toast -->

    <div
        id="toast"
        class="toast">

    </div>

    <!-- Authentication Script -->

    <script src="auth.js"></script>

</body>

</html>
